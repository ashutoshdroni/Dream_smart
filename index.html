<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DREAM SMART</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="logo">
    <h1>DREAM SMART</h1>
    <p>Let's Build The Dream</p>
  </div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Training</a></li>
      <li><a href="#">About us</a></li>
      <li><a href="#">Career</a></li>
      <li><a href="#">Contact us</a></li>
      <li><a href="#" class="signup-btn" id="openModal">Sign Up</a></li>
    </ul>
  </nav>
</header>

  <!-- Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-link active" data-tab="signup">Sign Up</button>
        <button class="tab-link" data-tab="login">Login</button>
        <button class="tab-link" data-tab="forgot">Forgot Password</button>
      </div>

      <!-- Sign Up Form -->
      <div id="signup" class="tab-content active">
        <form>
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email Address" required>
          <input type="password" placeholder="Create Password" required>
          <input type="password" placeholder="Confirm Password" required>
          <button type="submit">Sign Up</button>
        </form>
      </div>

      <!-- Login Form -->
      <div id="login" class="tab-content">
        <form>
          <input type="email" placeholder="Email Address" required>
          <input type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgot" class="tab-content">
        <form>
          <input type="email" placeholder="Enter your email" required>
          <button type="submit">Reset Password</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
