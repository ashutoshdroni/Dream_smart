<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DREAM SMART</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="logo">
    <h1>DREAM SMART</h1>
    <p>Let's Build The Dream</p>
  </div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Training</a></li>
      <li><a href="#">About us</a></li>
      <li><a href="#">Career</a></li>
      <li><a href="#">Contact us</a></li>
      <li><a href="#" id="showSignup">Sign Up</a></li>
      <li><a href="#" id="showLogin">Login</a></li>
    </ul>
  </nav>
</header>

<!-- Sign Up Form -->
<div id="signupForm" class="form-container">
  <h2>Sign Up</h2>
  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email Address" required>
    <input type="password" placeholder="Create Password" required>
    <input type="password" placeholder="Confirm Password" required>
    <button type="submit">Sign Up</button>
  </form>
</div>

<!-- Login Form -->
<div id="loginForm" class="form-container">
  <h2>Login</h2>
  <form>
    <input type="email" placeholder="Email Address" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p><a id="showForgot">Forgot Password?</a></p>
</div>

<!-- Forgot Password Form -->
<div id="forgotForm" class="form-container">
  <h2>Forgot Password</h2>
  <form>
    <input type="email" placeholder="Enter your email" required>
    <button type="submit">Reset Password</button>
  </form>
</div>

<script>
  const signupForm = document.getElementById("signupForm");
  const loginForm = document.getElementById("loginForm");
  const forgotForm = document.getElementById("forgotForm");

  // Show Sign Up
  document.getElementById("showSignup").addEventListener("click", (e) => {
    e.preventDefault(); // prevent page reload
    signupForm.classList.add("active");
    loginForm.classList.remove("active");
    forgotForm.classList.remove("active");
  });

  // Show Login
  document.getElementById("showLogin").addEventListener("click", (e) => {
    e.preventDefault();
    loginForm.classList.add("active");
    signupForm.classList.remove("active");
    forgotForm.classList.remove("active");
  });

  // Show Forgot Password
  document.getElementById("showForgot").addEventListener("click", (e) => {
    e.preventDefault();
    forgotForm.classList.add("active");
    loginForm.classList.remove("active");
    signupForm.classList.remove("active");
  });

  // Hide forms when clicking other nav links
  document.querySelectorAll("nav ul li a").forEach(link => {
    if (!link.id) { // exclude Sign Up and Login buttons
      link.addEventListener("click", () => {
        signupForm.classList.remove("active");
        loginForm.classList.remove("active");
        forgotForm.classList.remove("active");
      });
    }
  });
</script>
